<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora de Bhaskara para encontrar as raizes reais de uma equacao do segundo grau.">
    <title>Calculo de Bhaskara</title>
    <link rel="stylesheet" href="src/style/style.css">
</head>
<body>
    <header>
        <h1>Calculo de Bhaskara</h1>
        <p>Resolva equações do segundo grau informando os coeficientes A, B e C.</p>
    </header>

    <main class="container">
        <figure class="formula-card">
            <img src="src/img/Formula.png" alt="Formula de Bhaskara">
        </figure>

        <section class="inputsPlusDisplayArea" aria-labelledby="calculator-title">
            <div class="calculator-header">
                <h2 id="calculator-title">Calculadora</h2>
                <p>Use a forma ax2 + bx + c = 0.</p>
            </div>

            <form class="inputs">
                <div class="barras">
                    <label for="num1">Coeficiente A</label>
                    <input type="number" name="num1" id="num1" placeholder="Ex: 1" step="any">
                </div>

                <div class="barras">
                    <label for="num2">Coeficiente B</label>
                    <input type="number" name="num2" id="num2" placeholder="Ex: -3" step="any">
                </div>

                <div class="barras">
                    <label for="num3">Coeficiente C</label>
                    <input type="number" name="num3" id="num3" placeholder="Ex: 2" step="any">
                </div>

                <div class="buttons">
                    <button type="submit" id="calcular">Calcular</button>
                    <button type="button" id="limpar">Limpar</button>
                </div>
            </form>

            <output id="resultado" aria-live="polite">
                <span>Resultado</span>
                <p id="resultado-texto"></p>
            </output>
        </section>
    </main>

    <script src="src/script/script.js"></script>
</body>
</html>
